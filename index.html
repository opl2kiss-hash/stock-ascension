<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>台股昇天選股</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;700;900&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{--bg:#0b0f1a;--surface:#111827;--border:#1e2d45;--accent:#3b82f6;--accent2:#06b6d4;--text:#e2e8f0;--muted:#64748b}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:"Noto Sans TC",sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:20px}
body::before{content:"";position:fixed;inset:0;background-image:linear-gradient(rgba(59,130,246,.04) 1px,transparent 1px),linear-gradient(90deg,rgba(59,130,246,.04) 1px,transparent 1px);background-size:48px 48px;pointer-events:none}
.container{max-width:600px;width:100%;text-align:center;position:relative;z-index:1}
.badge{display:inline-flex;align-items:center;gap:6px;background:rgba(59,130,246,.12);border:1px solid rgba(59,130,246,.3);border-radius:100px;padding:4px 14px;font-size:11px;color:var(--accent2);letter-spacing:.08em;text-transform:uppercase;margin-bottom:18px}
.badge::before{content:"";width:6px;height:6px;border-radius:50%;background:var(--accent2);animation:pulse 2s ease-in-out infinite}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.4;transform:scale(.8)}}
.logo{font-size:clamp(32px,7vw,56px);font-weight:900;letter-spacing:-1px;background:linear-gradient(135deg,var(--accent) 0%,var(--accent2) 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;line-height:1;margin-bottom:10px}
.sub{font-size:12px;color:var(--muted);letter-spacing:3px;text-transform:uppercase;margin-bottom:44px}
.reports{background:var(--surface);border:1px solid var(--border);border-radius:16px;overflow:hidden;margin-bottom:24px;text-align:left}
.reports-header{padding:14px 24px;border-bottom:1px solid var(--border);font-size:11px;letter-spacing:3px;color:var(--muted);text-transform:uppercase}
.report-item{display:flex;align-items:center;justify-content:space-between;padding:16px 24px;border-bottom:1px solid var(--border);text-decoration:none;color:var(--text);transition:background .2s}
.report-item:last-child{border-bottom:none}
.report-item:hover{background:rgba(59,130,246,.06)}
.report-date{font-family:"DM Mono",monospace;font-size:18px;color:var(--accent);letter-spacing:1px}
.report-arrow{color:var(--muted);font-size:18px;transition:transform .2s}
.report-item:hover .report-arrow{transform:translateX(4px);color:var(--accent)}
.latest-badge{font-size:10px;background:rgba(59,130,246,.15);color:var(--accent2);border:1px solid rgba(59,130,246,.3);padding:2px 8px;border-radius:20px;letter-spacing:1px}
.footer{font-size:11px;color:var(--muted);letter-spacing:1px}
.loading{padding:40px;color:var(--muted);font-size:14px;text-align:center}
</style>
</head>
<body>
<div class="container">
  <div class="badge">台股技術型態選股</div>
  <div class="logo">Stock Ascension</div>
  <div class="sub">台股昇天選股 · 歷史報告</div>
  <div class="reports">
    <div class="reports-header">掃描報告列表</div>
    <div id="report-list"><div class="loading">載入中...</div></div>
  </div>
  <div class="footer">資料來源：FinMind · Yahoo Finance · 僅供參考，不構成投資建議</div>
</div>
<script>
async function loadReports(){
  const list=document.getElementById("report-list");
  try{
    const res=await fetch("date/reports.json?v="+Date.now());
    const reports=await res.json();
    if(!reports||reports.length===0){list.innerHTML='<div class="loading">尚無報告</div>';return}
    list.innerHTML="";
    reports.sort((a,b)=>b.localeCompare(a));
    reports.forEach((d,i)=>{
      const a=document.createElement("a");
      a.className="report-item";
      a.href="date/"+d+".html";
      a.innerHTML=`<div style="display:flex;align-items:center;gap:12px"><div class="report-date">${d}</div>${i===0?'<span class="latest-badge">最新</span>':""}</div><div class="report-arrow">→</div>`;
      list.appendChild(a);
    });
  }catch(e){list.innerHTML='<div class="loading">找不到報告資料</div>'}
}
loadReports();
</script>
</body>
</html>
